name: R package check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
      - name: Verify versioned M4 coverage report
        run: Rscript scripts/m4_coverage_report.R
      - name: Verify versioned M5 DA release
        run: Rscript scripts/m5_validate_release.R
      - name: Audit immutable release index
        run: Rscript scripts/m6_release_controls.R
      - name: Check package
        run: Rscript -e 'rcmdcheck::rcmdcheck(args = "--no-manual", error_on = "warning")'
